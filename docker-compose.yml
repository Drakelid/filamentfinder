version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: filamentfinder
      POSTGRES_PASSWORD: filamentfinder
      POSTGRES_DB: filamentfinder
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U filamentfinder"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    expose:
      - "8000"
    environment:
      - DATABASE_URL=postgresql://filamentfinder:filamentfinder@db:5432/filamentfinder
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key-change-in-production}
      - DEBUG=${DEBUG:-false}
      - CORS_ORIGINS=${CORS_ORIGINS:-https://fredrikdrakelid.asuscomm.com}
      - ADMIN_API_KEY=${ADMIN_API_KEY:-}
      - CONFIG_ENCRYPTION_KEY=${CONFIG_ENCRYPTION_KEY:-}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - MULLVAD_ACCOUNT_NUMBER=${MULLVAD_ACCOUNT_NUMBER:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - default
      - proxy
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxy
      - traefik.http.routers.filamentfinder-api-http.rule=Host(`fredrikdrakelid.asuscomm.com`) && PathPrefix(`/filamentfinder/api`)
      - traefik.http.routers.filamentfinder-api-http.entrypoints=web
      - traefik.http.routers.filamentfinder-api-http.priority=200
      - traefik.http.routers.filamentfinder-api-http.middlewares=filamentfinder-https-redirect
      - traefik.http.routers.filamentfinder-api-https.rule=Host(`fredrikdrakelid.asuscomm.com`) && PathPrefix(`/filamentfinder/api`)
      - traefik.http.routers.filamentfinder-api-https.entrypoints=websecure
      - traefik.http.routers.filamentfinder-api-https.priority=200
      - traefik.http.routers.filamentfinder-api-https.tls=true
      - traefik.http.routers.filamentfinder-api-https.tls.certresolver=le
      - traefik.http.routers.filamentfinder-api-https.middlewares=filamentfinder-api-strip-prefix
      - traefik.http.middlewares.filamentfinder-api-strip-prefix.stripprefix.prefixes=/filamentfinder
      - traefik.http.services.filamentfinder-api.loadbalancer.server.port=8000
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"

  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=postgresql://filamentfinder:filamentfinder@db:5432/filamentfinder
      - REDIS_URL=redis://redis:6379/0
      - CRAWLER_USER_AGENT=${CRAWLER_USER_AGENT:-FilamentFinder/1.0 (+https://github.com/filamentfinder; bot)}
      - CRAWLER_RATE_LIMIT=${CRAWLER_RATE_LIMIT:-1.0}
      - CRAWLER_MAX_PAGES=${CRAWLER_MAX_PAGES:-100}
      - CRAWLER_MAX_DEPTH=${CRAWLER_MAX_DEPTH:-3}
      - CRAWLER_TIMEOUT=${CRAWLER_TIMEOUT:-30}
      - CRAWLER_RESPECT_ROBOTS_TXT=${CRAWLER_RESPECT_ROBOTS_TXT:-true}
      - SCAN_SCHEDULE_ENABLED=${SCAN_SCHEDULE_ENABLED:-true}
      - SCAN_SCHEDULE_CRON=${SCAN_SCHEDULE_CRON:-0 6 * * *}
      - MULLVAD_SOCKS_PROXY=${MULLVAD_SOCKS_PROXY:-}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: python -m worker.scheduler

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_BASE: ${VITE_BASE:-/filamentfinder/}
        VITE_ADMIN_API_KEY: ${ADMIN_API_KEY:-}
    expose:
      - "3030"
    depends_on:
      - backend
    networks:
      - default
      - proxy
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxy
      - traefik.http.routers.filamentfinder-http.rule=Host(`fredrikdrakelid.asuscomm.com`) && PathPrefix(`/filamentfinder`)
      - traefik.http.routers.filamentfinder-http.entrypoints=web
      - traefik.http.routers.filamentfinder-http.priority=100
      - traefik.http.routers.filamentfinder-http.middlewares=filamentfinder-https-redirect
      - traefik.http.middlewares.filamentfinder-https-redirect.redirectscheme.scheme=https
      - traefik.http.middlewares.filamentfinder-https-redirect.redirectscheme.permanent=true
      - traefik.http.routers.filamentfinder-https.rule=Host(`fredrikdrakelid.asuscomm.com`) && PathPrefix(`/filamentfinder`)
      - traefik.http.routers.filamentfinder-https.entrypoints=websecure
      - traefik.http.routers.filamentfinder-https.priority=100
      - traefik.http.routers.filamentfinder-https.tls=true
      - traefik.http.routers.filamentfinder-https.tls.certresolver=le
      - traefik.http.routers.filamentfinder-https.middlewares=filamentfinder-frontend-strip-prefix
      - traefik.http.middlewares.filamentfinder-frontend-strip-prefix.stripprefix.prefixes=/filamentfinder
      - traefik.http.services.filamentfinder.loadbalancer.server.port=3030

volumes:
  postgres_data:
  redis_data:

networks:
  default:
  proxy:
    external: true
