version: '3.8'

services:
  gluetun:
    image: qmcgaw/gluetun:v3.40.2
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - VPN_SERVICE_PROVIDER=mullvad
      - VPN_TYPE=wireguard
      - WIREGUARD_PRIVATE_KEY=${MULLVAD_WIREGUARD_PRIVATE_KEY:-}
      - WIREGUARD_ADDRESSES=${MULLVAD_WIREGUARD_ADDRESSES:-}
      - SERVER_COUNTRIES=${MULLVAD_SERVER_COUNTRIES:-Norway,Sweden,Denmark,Finland}
      - OWNED_ONLY=yes
      - DOT=off
      - FIREWALL_OUTBOUND_SUBNETS=172.30.0.0/24
      - FIREWALL_INPUT_PORTS=8000
    restart: unless-stopped
    networks:
      default:
        ipv4_address: 172.30.0.2

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: filamentfinder
      POSTGRES_PASSWORD: filamentfinder
      POSTGRES_DB: filamentfinder
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U filamentfinder"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      default:
        ipv4_address: 172.30.0.3

  redis:
    image: redis:7-alpine
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      default:
        ipv4_address: 172.30.0.4

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    network_mode: "service:gluetun"
    environment:
      - DATABASE_URL=postgresql://filamentfinder:filamentfinder@172.30.0.3:5432/filamentfinder
      - REDIS_URL=redis://172.30.0.4:6379/0
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key-change-in-production}
      - DEBUG=${DEBUG:-false}
      - CORS_ORIGINS=${CORS_ORIGINS:-https://fredrikdrakelid.asuscomm.com}
      - ADMIN_API_KEY=${ADMIN_API_KEY:-}
      - CONFIG_ENCRYPTION_KEY=${CONFIG_ENCRYPTION_KEY:-}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - MULLVAD_ACCOUNT_NUMBER=${MULLVAD_ACCOUNT_NUMBER:-}
      - MULLVAD_SOCKS_PROXY=${MULLVAD_SOCKS_PROXY:-}
      - GLUETUN_ENABLED=true
    depends_on:
      gluetun:
        condition: service_started
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"

  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    network_mode: "service:gluetun"
    environment:
      - DATABASE_URL=postgresql://filamentfinder:filamentfinder@172.30.0.3:5432/filamentfinder
      - REDIS_URL=redis://172.30.0.4:6379/0
      - CRAWLER_USER_AGENT=${CRAWLER_USER_AGENT:-FilamentFinder/1.0 (+https://github.com/filamentfinder; bot)}
      - CRAWLER_RATE_LIMIT=${CRAWLER_RATE_LIMIT:-1.0}
      - CRAWLER_MAX_PAGES=${CRAWLER_MAX_PAGES:-100}
      - CRAWLER_MAX_DEPTH=${CRAWLER_MAX_DEPTH:-3}
      - CRAWLER_TIMEOUT=${CRAWLER_TIMEOUT:-30}
      - CRAWLER_RESPECT_ROBOTS_TXT=${CRAWLER_RESPECT_ROBOTS_TXT:-true}
      - SCAN_SCHEDULE_ENABLED=${SCAN_SCHEDULE_ENABLED:-true}
      - SCAN_SCHEDULE_CRON=${SCAN_SCHEDULE_CRON:-0 6 * * *}
      - MULLVAD_SOCKS_PROXY=${MULLVAD_SOCKS_PROXY:-}
      - GLUETUN_ENABLED=true
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    depends_on:
      gluetun:
        condition: service_started
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: python -m worker.scheduler

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_BASE: ${VITE_BASE:-/filamentfinder/}
        VITE_ADMIN_API_KEY: ${ADMIN_API_KEY:-}
    expose:
      - "3030"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:

networks:
  default:
    ipam:
      config:
        - subnet: 172.30.0.0/24
