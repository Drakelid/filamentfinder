services:
  gluetun:
    image: qmcgaw/gluetun:v3.40.2
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - VPN_SERVICE_PROVIDER=custom
      - VPN_TYPE=wireguard
      - DOT=off
      - HTTPPROXY=on
    restart: unless-stopped
    volumes:
      - gluetun_data:/gluetun

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: filamentfinder
      POSTGRES_PASSWORD: filamentfinder
      POSTGRES_DB: filamentfinder
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U filamentfinder"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://filamentfinder:filamentfinder@db:5432/filamentfinder}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - GLUETUN_ENABLED=${GLUETUN_ENABLED:-false}
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key-change-in-production}
      - DEBUG=${DEBUG:-false}
      - CORS_ORIGINS=${CORS_ORIGINS:-https://filament.devdeploy.online/}
      - ADMIN_API_KEY=${ADMIN_API_KEY:-}
      - CONFIG_ENCRYPTION_KEY=${CONFIG_ENCRYPTION_KEY:-}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - MULLVAD_ACCOUNT_NUMBER=${MULLVAD_ACCOUNT_NUMBER:-}
      - MULLVAD_SOCKS_PROXY=${MULLVAD_SOCKS_PROXY:-http://gluetun:8888}
    volumes:
      - gluetun_data:/gluetun
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://filamentfinder:filamentfinder@db:5432/filamentfinder}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - GLUETUN_ENABLED=${GLUETUN_ENABLED:-false}
      - CRAWLER_USER_AGENT=${CRAWLER_USER_AGENT:-Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/133.0.0.0 Safari/537.36}
      - CRAWLER_RATE_LIMIT=${CRAWLER_RATE_LIMIT:-1.0}
      - CRAWLER_MAX_PAGES=${CRAWLER_MAX_PAGES:-100}
      - CRAWLER_MAX_DEPTH=${CRAWLER_MAX_DEPTH:-3}
      - CRAWLER_TIMEOUT=${CRAWLER_TIMEOUT:-30}
      - CRAWLER_RESPECT_ROBOTS_TXT=${CRAWLER_RESPECT_ROBOTS_TXT:-true}
      - SCAN_SCHEDULE_ENABLED=${SCAN_SCHEDULE_ENABLED:-true}
      - SCAN_SCHEDULE_CRON=${SCAN_SCHEDULE_CRON:-0 6 * * *}
      - MULLVAD_SOCKS_PROXY=${MULLVAD_SOCKS_PROXY:-http://gluetun:8888}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - gluetun_data:/gluetun
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      gluetun:
        condition: service_started
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: python -m worker.scheduler
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_BASE: ${VITE_BASE:-/}
        VITE_ADMIN_API_KEY: ${ADMIN_API_KEY:-}
    expose:
      - "3030"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  gluetun_data:
  postgres_data:
  redis_data:
