version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: filamentfinder
      POSTGRES_PASSWORD: filamentfinder
      POSTGRES_DB: filamentfinder
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U filamentfinder"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    expose:
      - "8000"
    environment:
      - DATABASE_URL=postgresql://filamentfinder:filamentfinder@db:5432/filamentfinder
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key-change-in-production}
      - DEBUG=${DEBUG:-false}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      - ADMIN_API_KEY=${ADMIN_API_KEY:-}
      - CONFIG_ENCRYPTION_KEY=${CONFIG_ENCRYPTION_KEY:-}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - MULLVAD_ACCOUNT_NUMBER=${MULLVAD_ACCOUNT_NUMBER:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"

  mullvad:
    image: ghcr.io/qdm12/gluetun:latest
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - VPN_SERVICE_PROVIDER=mullvad
      - VPN_TYPE=wireguard
      - WIREGUARD_PRIVATE_KEY=${MULLVAD_WIREGUARD_PRIVATE_KEY:-}
      - WIREGUARD_ADDRESSES=${MULLVAD_WIREGUARD_ADDRESSES:-}
      - SERVER_COUNTRIES=${MULLVAD_SERVER_COUNTRIES:-Sweden}
      - FIREWALL_OUTBOUND_SUBNETS=172.16.0.0/12
      - UPDATER_PERIOD=0
      - UPDATER_VPN_SERVICE_PROVIDERS=mullvad
    volumes:
      - mullvad_data:/gluetun
    healthcheck:
      test: ["CMD", "/gluetun-entrypoint", "healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=postgresql://filamentfinder:filamentfinder@db:5432/filamentfinder
      - REDIS_URL=redis://redis:6379/0
      - CRAWLER_USER_AGENT=${CRAWLER_USER_AGENT:-FilamentFinder/1.0 (+https://github.com/filamentfinder; bot)}
      - CRAWLER_RATE_LIMIT=${CRAWLER_RATE_LIMIT:-1.0}
      - CRAWLER_MAX_PAGES=${CRAWLER_MAX_PAGES:-100}
      - CRAWLER_MAX_DEPTH=${CRAWLER_MAX_DEPTH:-3}
      - CRAWLER_TIMEOUT=${CRAWLER_TIMEOUT:-30}
      - CRAWLER_RESPECT_ROBOTS_TXT=${CRAWLER_RESPECT_ROBOTS_TXT:-true}
      - SCAN_SCHEDULE_ENABLED=${SCAN_SCHEDULE_ENABLED:-true}
      - SCAN_SCHEDULE_CRON=${SCAN_SCHEDULE_CRON:-0 6 * * *}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      mullvad:
        condition: service_healthy
    network_mode: "service:mullvad"
    volumes:
      - ./worker:/app/worker
    command: python -m worker.scheduler

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    expose:
      - "3030"
    environment:
      - VITE_API_URL=http://backend:8000
      - VITE_ADMIN_API_KEY=${ADMIN_API_KEY:-}
    command: npm run dev -- --host 0.0.0.0 --port 3030 --strictPort
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - default
      - proxy
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxy
      - traefik.http.routers.filamentfinder-http.rule=Host(`fredrikdrakelid.asuscomm.com`) && PathPrefix(`/filamentfinder`)
      - traefik.http.routers.filamentfinder-http.entrypoints=web
      - traefik.http.routers.filamentfinder-http.middlewares=filamentfinder-https-redirect
      - traefik.http.middlewares.filamentfinder-https-redirect.redirectscheme.scheme=https
      - traefik.http.middlewares.filamentfinder-https-redirect.redirectscheme.permanent=true
      - traefik.http.routers.filamentfinder-https.rule=Host(`fredrikdrakelid.asuscomm.com`) && PathPrefix(`/filamentfinder`)
      - traefik.http.routers.filamentfinder-https.entrypoints=websecure
      - traefik.http.routers.filamentfinder-https.tls=true
      - traefik.http.routers.filamentfinder-https.tls.certresolver=le
      - traefik.http.routers.filamentfinder-https.middlewares=filamentfinder-strip-prefix
      - traefik.http.middlewares.filamentfinder-strip-prefix.stripprefix.prefixes=/filamentfinder
      - traefik.http.services.filamentfinder.loadbalancer.server.port=3030

volumes:
  postgres_data:
  redis_data:
  mullvad_data:

networks:
  proxy:
    external: true
